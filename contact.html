<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Raghad - 163649</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="script.js"></script>
</head>
<body>

    <nav class="glass-nav">
        <div class="nav-content">
            <span class="nav-logo">Raghad<span>.Portfolio</span></span>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="contact.html" class="active">Contact Me</a>
            </div>
        </div>
    </nav>

    <header class="profile-header small-header">
        <div class="profile-container">
            <h1>Get In Touch ✉️</h1>
            <p class="subtitle">I'd love to hear from you!</p>
        </div>
    </header>

    <main class="content-wrapper">
        <section class="info-card contact-card">
            <form name="contactForm" onsubmit="return validateForm()" class="modern-form">
                <div class="input-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="Enter your full name">
                </div>

                <div class="input-group">
                    <label>Email Address</label>
                    <input type="email" name="email" placeholder="username@example.com">
                </div>

                <div class="input-group">
                    <label>Country</label>
                    <input type="text" name="country" placeholder="Your country">
                </div>

                <div class="input-group">
                    <label>Your Comments</label>
                    <textarea name="comments" rows="5" placeholder="Write your message here..."></textarea>
                </div>

                <button type="submit" class="submit-btn">Send Message 🚀</button>
            </form>
        </section>
    </main>

    <footer class="main-footer">
        <p>© 2026 Raghad Doughlas | JUST University</p>
    </footer>

</body>
</html>
